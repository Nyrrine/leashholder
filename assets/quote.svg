<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <text x="20" y="35" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#FF4444" xml:space="preserve">&#x275D;</text>
  <text x="60" y="35" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#00CED1" xml:space="preserve">So this is what Daguanyuan looks like from the zenith of Hongyuan, huh?</text>
  <text x="60" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#00CED1" xml:space="preserve">Fuhu, then I suppose&#x2026; &#x2026; I have need of this pretense no longer.</text>
  <text x="698" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#FF4444" xml:space="preserve">&#x275E;</text>
  <text x="60" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#FFFFFF" font-style="italic" xml:space="preserve">&#x2014; Hong Lu, The Lord of Hongyuan</text>
</svg>
